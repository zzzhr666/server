syntax = "proto3";

package battle.v1;

option go_package = "server/internal/contract/battlepb;battlepb";

message ClientHello {
  string room_name = 1;
  int64 player_id = 2;
  string token = 3;
}

message ServerHello {
  uint32  conv = 1;
  string message = 2;
}

message GameStart {
  string room_name = 1;
  repeated int64 player_ids = 2;
}

message Error {
  string code = 1;
  string message = 2;
}

message ClientPacket {
  oneof payload {
    ClientHello hello = 1;
  }
}

message ServerPacket {
  oneof payload {
    ServerHello hello = 1;
    GameStart game_start = 2;
    Error error = 3;
    GameOver game_over = 4;
  }
}

message GameOver {
  string room_name = 1;
  repeated int64 player_ids = 2;
  string reason = 3;
}
syntax = "proto3";

package state.v1;

option go_package = "server/internal/contract/statepb;statepb";

import "google/protobuf/timestamp.proto";
import "google/protobuf/duration.proto";

service StateService {
  rpc CreateAccount(CreateAccountRequest) returns (CreateAccountResponse);
  rpc GetAccount(GetAccountRequest) returns (GetAccountResponse);
  rpc RegisterAccount(RegisterAccountRequest) returns (RegisterAccountResponse);

  rpc CreateSession(CreateSessionRequest) returns (CreateSessionResponse);
  rpc GetSession(GetSessionRequest) returns (GetSessionResponse);
  rpc DeleteSession(DeleteSessionRequest) returns (DeleteSessionResponse);

  rpc CreatePlayer(CreatePlayerRequest) returns (CreatePlayerResponse);
  rpc GetPlayer(GetPlayerRequest) returns (GetPlayerResponse);
  rpc NextPlayerID(NextPlayerIDRequest) returns (NextPlayerIDResponse);

  rpc SetPresence(SetPresenceRequest) returns (SetPresenceResponse);
  rpc GetPresence(GetPresenceRequest) returns (GetPresenceResponse);
  rpc ClearPresence(ClearPresenceRequest) returns (ClearPresenceResponse);
  rpc RefreshPresence(RefreshPresenceRequest) returns (RefreshPresenceResponse);

  rpc SendFriendRequest(SendFriendRequestRequest) returns (SendFriendRequestResponse);
  rpc ListIncomingRequest(ListFriendRequestRequest) returns (ListFriendRequestResponse);
  rpc ListOutgoingRequest(ListFriendRequestRequest) returns (ListFriendRequestResponse);
  rpc AcceptFriendRequest(HandleFriendRequestRequest) returns (HandleFriendRequestResponse);
  rpc RejectFriendRequest(HandleFriendRequestRequest) returns (HandleFriendRequestResponse);
  rpc ListFriendIDs(ListFriendIDsRequest) returns (ListFriendIDsResponse);
  rpc DeleteFriend(DeleteFriendRequest) returns (DeleteFriendResponse);

  rpc PublishRealtime(PublishRealtimeRequest) returns (PublishRealtimeResponse);
  rpc SubscribeRealtime(SubscribeRealtimeRequest) returns (stream RealtimeEvent);
}

message Account {
  string username = 1;
  string password_hash = 2;
  int64 player_id = 3;
}

message Session {
  string token = 1;
  int64 player_id = 2;
  google.protobuf.Timestamp expires_at = 3;
}

message Player {
  int64 id = 1;
  string nickname = 2;
  string avatar = 3;
  string email = 4;
  string phone = 5;
}

message CreateAccountRequest {
  Account account = 1;
}

message CreateAccountResponse {}

message GetAccountRequest {
  string username = 1;
}

message GetAccountResponse {
  Account account = 1;
}

message RegisterAccountRequest {
  string username = 1;
  string password_hash = 2;
  string nickname = 3;
  string avatar = 4;
  string email = 5;
  string phone = 6;
  string session_token = 7;
  google.protobuf.Timestamp session_expires_at = 8;
}

message RegisterAccountResponse {
  Account account = 1;
  Player player = 2;
  Session session = 3;
}

message CreateSessionRequest {
  Session session = 1;
}

message CreateSessionResponse {}

message GetSessionRequest {
  string token = 1;
}

message GetSessionResponse {
  Session session = 1;
}

message DeleteSessionRequest {
  string token = 1;
}

message DeleteSessionResponse {}

message CreatePlayerRequest {
  Player player = 1;
}

message CreatePlayerResponse {}

message GetPlayerRequest {
  int64 id = 1;
}

message GetPlayerResponse {
  Player player = 1;
}

message NextPlayerIDRequest {}

message NextPlayerIDResponse {
  int64 id = 1;
}

message Presence {
  int64 player_id = 1;
  string server_name = 2;
  string status = 3;
  google.protobuf.Timestamp updated_at = 4;
}

message SetPresenceRequest {
  Presence presence = 1;
  google.protobuf.Duration ttl = 2;
}

message SetPresenceResponse {}

message GetPresenceRequest {
  int64 player_id = 1;
}

message GetPresenceResponse {
  Presence presence = 1;
}

message ClearPresenceRequest {
  int64 player_id = 1;
  string server_name = 2;
}

message ClearPresenceResponse {}

message RefreshPresenceRequest {
  int64 player_id = 1;
  string server_name = 2;
  google.protobuf.Timestamp updated_at = 3;
  google.protobuf.Duration ttl = 4;
}

message RefreshPresenceResponse {}

message FriendRequest {
  int64 from_player = 1;
  int64 to_player = 2;
  google.protobuf.Timestamp created_at = 3;
}


message SendFriendRequestRequest {
  int64 from_player_id = 1;
  int64 to_player_id = 2;
}

message SendFriendRequestResponse {}

message ListFriendRequestRequest {
  int64 player_id = 1;
}

message ListFriendRequestResponse {
  repeated FriendRequest requests = 1;
}



message HandleFriendRequestRequest {
  int64 from_player_id = 1;
  int64 to_player_id = 2;
}

message HandleFriendRequestResponse {}

message ListFriendIDsRequest {
  int64 player_id = 1;
}

message ListFriendIDsResponse {
  repeated int64 friend_player_ids = 1;
}

message DeleteFriendRequest{
  int64 player_id = 1;
  int64 friend_player_id = 2;
}

message DeleteFriendResponse {}

message RealtimeEvent {
  string type = 1;
  int64 target_player_id = 2;
  int64 actor_player_id = 3;
  bool online = 4;
  string status = 5;
  string match_status = 6;
  string room_name = 7;
  string match_token = 8;
  string battle_kcp_addr = 9;
  string battle_node_name = 10;
  repeated int64 match_player_ids = 11;
}

message PublishRealtimeRequest {
  string server_name = 1;
  RealtimeEvent event = 2;
}

message PublishRealtimeResponse {}

message SubscribeRealtimeRequest {
  string server_name = 1;
}
